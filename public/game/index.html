<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🧠 IQ 두뇌 건강 테스트 - 틀린 그림 찾기</title>
  <meta name="description" content="시니어 대상 실시간 뇌 연령 & IQ 테스트! 다른 부분 3곳을 찾아 두뇌 나이를 젊게 유지하세요. 친구들과 결과를 카카오톡으로 공유해보세요.">

  <!-- Google Fonts: Noto Sans KR (Korean), Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Outfit:wght@500;800&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="/game/style.css">

  <!-- 구글 애드센스 H5 게임 광고 및 기본 스크립트 로드 -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5633731930294890"
    crossorigin="anonymous"></script>
  <script>
    window.adsbygoogle = window.adsbygoogle || [];
    var adBreak = adConfig = function(o) { adsbygoogle.push(o); }
    adBreak._isStub = true; // SDK 미로드 감지용 마커 (실제 SDK 로드 시 이 속성이 없는 함수로 교체됨)
    adConfig({
      preloadAdBreaks: 'on'
    });
  </script>

  <!-- Kakao SDK -->
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
    integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4"
    crossorigin="anonymous"></script>
</head>

<body>

  <!-- 전체 레이아웃 컨테이너 -->
  <div id="game-app-container">

    <!-- 2. 게임 플레이 화면 -->
    <section id="game-screen" class="app-screen active">
      <!-- 게임 화면 상단 수동 애드센스 광고 영역 (z-index: 101로 오버레이 위에 배치) -->
      <div class="adsense-container ads-game-screen">
        <!-- atlas 수동광고 -->
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5633731930294890"
          data-ad-slot="2074402093" data-ad-format="horizontal" data-full-width-responsive="false"></ins>
      </div>

      <!-- 시작 오버레이 (게임 최초 로드 시 화면 위에 노출되며, 시작 버튼 클릭 시 페이드 아웃) -->
      <div id="start-overlay">
        <button id="btn-start-game" class="btn btn-primary btn-large" disabled>
          게임 설정 로딩 중... ⏳
        </button>
      </div>


      <!-- 헤더 점수 및 타이머 바 -->
      <header class="game-header">
        <div class="header-top">
          <div class="header-left" style="display: flex; align-items: center; gap: 8px;">
            <div class="stage-badge" id="current-stage-display">1단계 / 3</div>
            <button id="btn-toggle-sound" class="btn-sound-toggle" title="소리 켜기/끄기">🔊</button>
          </div>
          <div class="score-display">
            <div class="score-item attempts-display">
              <span class="label">기회:</span>
              <span class="value" id="attempts-value">❤️❤️❤️❤️❤️</span>
            </div>
            <div class="score-item age-warning">
              <span class="label">뇌 연령:</span>
              <span class="value" id="brain-age-value">20세</span>
            </div>
            <div class="score-item iq-danger">
              <span class="label">IQ:</span>
              <span class="value" id="iq-value">150</span>
            </div>
          </div>
        </div>
        <!-- 긴박한 연령 게이지 바 -->
        <div class="timer-bar-wrapper">
          <div class="timer-bar-container">
            <div id="timer-progress" class="timer-progress-bar"></div>
          </div>
          <span id="timer-seconds-text" class="timer-seconds-text">60초</span>
        </div>
      </header>

      <!-- 플레이 영역 (상하 2개 이미지 프레임) -->
      <main class="game-play-area">
        <!-- 상단 이미지 프레임 -->
        <div id="frame-top" class="game-image-frame">
          <img id="img-top" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
            alt="원본 이미지" draggable="false">
          <div id="overlay-top" class="diff-overlay"></div>
        </div>

        <!-- 구분선 (시각적 분할) -->
        <div class="divider-line"></div>

        <!-- 하단 이미지 프레임 -->
        <div id="frame-bottom" class="game-image-frame">
          <img id="img-bottom" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
            alt="비교 이미지" draggable="false">
          <div id="overlay-bottom" class="diff-overlay"></div>
        </div>
      </main>

      <!-- 하단 정보 영역 -->
      <footer class="game-footer">
        <div class="footer-status">
          <span class="status-icon">🔍</span>
          <span class="status-text">틀린 그림: <strong id="found-count-value">0 / 3</strong></span>
          <div id="diff-dots-container" class="diff-dots-container"></div>
        </div>
        <p class="guide-tip">두 그림 중 다른 곳 아무데나 터치해도 정답 처리됩니다!</p>
      </footer>
    </section>

    <!-- 3. 결과 화면 -->
    <section id="end-screen" class="app-screen">
      <!-- 결과 화면 상단 수동 애드센스 광고 영역 -->
      <div class="adsense-container ads-end-screen">
        <!-- atlas 수동광고 -->
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5633731930294890"
          data-ad-slot="2074402093" data-ad-format="horizontal" data-full-width-responsive="false"></ins>
      </div>

      <div class="result-header">
        <span class="emoji-logo">🏆</span>
        <h2>테스트 결과 리포트</h2>
      </div>

      <!-- 성적표 카드 -->
      <div class="result-card">
        <div class="result-stats">
          <div class="stat-box">
            <span class="stat-label">최종 뇌 연령</span>
            <strong class="stat-value text-primary" id="final-brain-age">--세</strong>
          </div>
          <div class="stat-box">
            <span class="stat-label">최종 IQ 지수</span>
            <strong class="stat-value text-secondary" id="final-iq">--</strong>
          </div>
        </div>

        <div class="result-diagnosis">
          <h3 id="diagnosis-title">두뇌 진단명</h3>
          <p id="diagnosis-description">상세 진단 결과 내용이 여기에 들어갑니다.</p>
        </div>
      </div>

      <!-- 액션 버튼 영역 -->
      <div class="action-buttons">
        <button id="btn-share-kakao" class="btn btn-kakao">
          <span class="btn-icon">💬</span> 카카오톡 결과 공유하기
        </button>
        <button id="btn-copy-link" class="btn btn-secondary">
          <span class="btn-icon">📋</span> 결과 글 복사하기
        </button>
        <button id="btn-restart" class="btn btn-outline">
          🔄 다시 도전하기
        </button>
      </div>
    </section>

    <!-- 기회 소진 충전 안내 모달 -->
    <div id="modal-refill-attempts" class="game-modal-overlay">
      <div class="game-modal-content">
        <span class="modal-emoji">💡</span>
        <h2>기회를 모두 소진했습니다!</h2>
        <p>무료 동영상 광고를 <strong>5초간 시청</strong>하시면,<br>기회가 다시 가득 충전되어 이어서 하실 수 있습니다.</p>
        <div class="modal-buttons">
          <button id="btn-refill-ad" class="btn btn-primary">🎬 광고 시청하고 이어하기</button>
          <button id="btn-give-up" class="btn btn-outline">결과 보러 가기</button>
        </div>
      </div>
    </div>

    <!-- 가상 동영상 광고 오버레이 -->
    <div id="ad-simulation-overlay" class="ad-simulation-overlay">
      <div class="ad-simulation-content">
        <div class="ad-badge">AD (가상 광고)</div>
        <div class="ad-video-mock">
          <div class="ad-spinner"></div>
          <p class="ad-main-message">두뇌 건강 증진 캠페인 영상</p>
          <p class="ad-sub-message">영상이 종료되면 기회가 충전됩니다.</p>
        </div>
        <div id="ad-countdown-text" class="ad-countdown-text">5초 후 닫기</div>
      </div>
    </div>

  </div>

  <!-- 토스트 알림창 -->
  <div id="toast" class="toast-message"></div>

  <script src="/game/game.js"></script>
</body>

</html>
