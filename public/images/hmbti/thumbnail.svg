<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">HMBTI 카카오 공유 썸네일</title>
  <desc id="desc">국대 감독직을 노리는 밈 느낌의 HMBTI 공유 썸네일</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1d3d"/>
      <stop offset="0.55" stop-color="#1f7a74"/>
      <stop offset="1" stop-color="#d6d28b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#081223" flood-opacity="0.32"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#081223" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="466" width="1200" height="164" fill="#f1d54b" opacity="0.18"/>
  <rect x="56" y="56" width="1088" height="518" rx="28" fill="#f7f5ea" opacity="0.14"/>

  <g opacity="0.24">
    <circle cx="116" cy="138" r="60" fill="#ffffff"/>
    <circle cx="1030" cy="118" r="56" fill="#ffffff"/>
    <path d="M92 358h180v160H92z" fill="#ffffff"/>
    <path d="M940 318h174v182H940z" fill="#ffffff"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="110" y="86" width="980" height="380" rx="26" fill="#e71b44"/>
    <rect x="132" y="108" width="936" height="336" rx="18" fill="#ffffff"/>
  </g>

  <g transform="translate(196 128)">
    <rect x="0" y="0" width="220" height="54" rx="27" fill="#17233f" opacity="0.94"/>
    <text x="110" y="35" text-anchor="middle"
      font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif"
      font-size="24" font-weight="900" fill="#ffffff">HMBTI SHARE</text>
  </g>

  <g transform="translate(172 180)" filter="url(#soft)">
    <rect x="0" y="0" width="856" height="178" rx="18" fill="#17233f"/>
    <text x="428" y="74" text-anchor="middle"
      font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif"
      font-size="66" font-weight="900" fill="#ffffff">국대 감독직</text>
    <text x="428" y="144" text-anchor="middle"
      font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif"
      font-size="66" font-weight="900" fill="#ffffff">뺏으러 가기</text>
  </g>

  <g transform="translate(900 150) rotate(11)" filter="url(#soft)">
    <rect x="0" y="0" width="172" height="70" rx="35" fill="#ffde59"/>
    <text x="86" y="45" text-anchor="middle"
      font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif"
      font-size="28" font-weight="900" fill="#17233f">밈 ON</text>
  </g>

  <g transform="translate(178 372)">
    <rect x="0" y="0" width="460" height="54" rx="27" fill="#e71b44"/>
    <text x="230" y="36" text-anchor="middle"
      font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif"
      font-size="24" font-weight="900" fill="#ffffff">홍명보 지수 테스트 바로가기</text>
  </g>

  <g transform="translate(762 344)" filter="url(#soft)">
    <rect x="0" y="0" width="220" height="92" rx="12" fill="#ffde59" stroke="#17233f" stroke-width="6"/>
    <text x="110" y="38" text-anchor="middle"
      font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif"
      font-size="24" font-weight="900" fill="#17233f">방구석</text>
    <text x="110" y="69" text-anchor="middle"
      font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif"
      font-size="24" font-weight="900" fill="#17233f">감독 자격증</text>
  </g>
</svg>
