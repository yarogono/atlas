<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">홍명보 테스트 출입금지 밈 배너</title>
  <desc id="desc">편의점 유리문에 붙은 출입금지 안내문을 패러디한 HMBTI 메인 배너</desc>
  <defs>
    <linearGradient id="storeLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf6ff"/>
      <stop offset="0.44" stop-color="#cde7f7"/>
      <stop offset="1" stop-color="#ffe69a"/>
    </linearGradient>
    <linearGradient id="doorGlass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.86"/>
      <stop offset="0.42" stop-color="#9bd7f4" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.62"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#13233f" flood-opacity="0.28"/>
    </filter>
    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#25324d" flood-opacity="0.28"/>
    </filter>
    <pattern id="floorLines" width="72" height="72" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
      <path d="M0 72H72" fill="none" stroke="#ffffff" stroke-opacity="0.42" stroke-width="2"/>
      <path d="M72 0V72" fill="none" stroke="#ffffff" stroke-opacity="0.26" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#162540"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#storeLight)"/>
  <rect x="0" y="438" width="1200" height="192" fill="#34445f" opacity="0.25"/>
  <rect x="0" y="438" width="1200" height="192" fill="url(#floorLines)" opacity="0.72"/>

  <g opacity="0.7">
    <rect x="98" y="118" width="146" height="352" rx="8" fill="#31547a" opacity="0.32"/>
    <rect x="956" y="105" width="154" height="362" rx="8" fill="#31547a" opacity="0.3"/>
    <rect x="294" y="120" width="92" height="330" rx="8" fill="#fff5c6" opacity="0.55"/>
    <rect x="804" y="126" width="90" height="326" rx="8" fill="#fff5c6" opacity="0.5"/>
    <rect x="0" y="72" width="1200" height="18" fill="#ffffff" opacity="0.72"/>
    <rect x="60" y="46" width="350" height="14" rx="7" fill="#ffffff" opacity="0.8"/>
    <rect x="494" y="46" width="252" height="14" rx="7" fill="#ffffff" opacity="0.72"/>
    <rect x="825" y="46" width="296" height="14" rx="7" fill="#ffffff" opacity="0.76"/>
  </g>

  <g opacity="0.46">
    <rect x="44" y="322" width="218" height="122" rx="10" fill="#2f4368"/>
    <rect x="930" y="306" width="228" height="132" rx="10" fill="#2f4368"/>
    <circle cx="180" cy="272" r="42" fill="#203250"/>
    <rect x="144" y="313" width="70" height="132" rx="34" fill="#203250"/>
    <circle cx="1010" cy="254" r="38" fill="#203250"/>
    <rect x="978" y="292" width="66" height="138" rx="32" fill="#203250"/>
  </g>

  <rect x="58" y="34" width="1084" height="522" rx="18" fill="url(#doorGlass)" opacity="0.58"/>
  <path d="M600 34V556" stroke="#ffffff" stroke-width="10" stroke-opacity="0.72"/>
  <path d="M88 88H1112" stroke="#ffffff" stroke-width="4" stroke-opacity="0.55"/>
  <path d="M114 514H1088" stroke="#10213f" stroke-width="8" stroke-opacity="0.22"/>
  <path d="M176 22L80 556" stroke="#ffffff" stroke-width="20" stroke-opacity="0.24"/>
  <path d="M1040 8L910 556" stroke="#ffffff" stroke-width="24" stroke-opacity="0.2"/>

  <g filter="url(#softShadow)">
    <rect x="150" y="390" width="900" height="156" rx="10" fill="#14233f"/>
    <rect x="168" y="408" width="864" height="120" rx="6" fill="#f6cf36"/>
    <text x="600" y="486" text-anchor="middle"
      font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif"
      font-size="64" font-weight="900" letter-spacing="2" fill="#1b2440">HMBTI TEST ZONE</text>
  </g>

  <g transform="translate(305 76) rotate(-1)" filter="url(#paperShadow)">
    <rect x="0" y="0" width="590" height="350" rx="4" fill="#f8f8f3"/>
    <rect x="0" y="0" width="590" height="350" rx="4" fill="#ffffff" opacity="0.5"/>
    <path d="M0 0H590V350H0Z" fill="none" stroke="#dadbd3" stroke-width="6"/>
    <circle cx="106" cy="120" r="62" fill="none" stroke="#e0182d" stroke-width="22"/>
    <path d="M63 77L149 163" stroke="#e0182d" stroke-width="22" stroke-linecap="round"/>
    <text x="356" y="110" text-anchor="middle"
      font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif"
      font-size="55" font-weight="900" fill="#171717">홍명보는</text>
    <text x="356" y="184" text-anchor="middle"
      font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif"
      font-size="61" font-weight="900" fill="#171717">테스트 금지</text>
    <text x="295" y="266" text-anchor="middle"
      font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif"
      font-size="39" font-weight="800" fill="#333333">출입금지</text>
    <text x="295" y="312" text-anchor="middle"
      font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif"
      font-size="24" font-weight="800" fill="#6c6c6c">HMBTI 운영본부</text>
  </g>

  <g transform="translate(805 112) rotate(9)" filter="url(#paperShadow)">
    <rect x="0" y="0" width="172" height="68" rx="34" fill="#e0182d"/>
    <text x="86" y="45" text-anchor="middle"
      font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif"
      font-size="27" font-weight="900" fill="#ffffff">삐-익!</text>
  </g>

  <g transform="translate(198 134) rotate(-12)" filter="url(#paperShadow)">
    <rect x="0" y="0" width="174" height="70" rx="8" fill="#ffffff" stroke="#17233f" stroke-width="5"/>
    <text x="87" y="45" text-anchor="middle"
      font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif"
      font-size="25" font-weight="900" fill="#17233f">응시 불가</text>
  </g>
</svg>
